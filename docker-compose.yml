name: cytroksys

services:
  app:
    build:
      context: .
      target: dev
    container_name: cytroksys-dev
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_API_PROXY_TARGET: ${VITE_API_PROXY_TARGET:-http://api:8787}
      VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID:-}
      VITE_EMAILJS_TEMPLATE_ID: ${VITE_EMAILJS_TEMPLATE_ID:-}
      VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY:-}
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - api
    restart: unless-stopped
    profiles: ["dev"]

  api:
    build:
      context: .
      target: api
    container_name: cytroksys-api
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL: ${GOOGLE_MODEL:-gemini-2.0-flash}
      PORT: 8787
    restart: unless-stopped
    profiles: ["dev", "prod"]

  web:
    build:
      context: .
      target: prod
      args:
        VITE_EMAILJS_SERVICE_ID: ${VITE_EMAILJS_SERVICE_ID:-}
        VITE_EMAILJS_TEMPLATE_ID: ${VITE_EMAILJS_TEMPLATE_ID:-}
        VITE_EMAILJS_PUBLIC_KEY: ${VITE_EMAILJS_PUBLIC_KEY:-}
    container_name: cytroksys-web
    depends_on:
      - api
    ports:
      - "9488:80"
    restart: unless-stopped
    profiles: ["prod"]

volumes:
  node_modules:
